<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Color Test</title>
    <style>
        :root {
            --background: oklch(0.97 0 0);
            --foreground: oklch(0.145 0 0);
        }

        .dark {
            --background: oklch(0.269 0 0);
            --foreground: oklch(0.985 0 0);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--foreground);
            transition: background-color 0.3s ease;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .color-box {
            padding: 40px;
            margin: 20px 0;
            border-radius: 8px;
            border: 2px solid var(--foreground);
        }

        .light-bg {
            background-color: oklch(0.97 0 0);
        }

        .dark-bg {
            background-color: oklch(0.269 0 0);
        }

        .pure-white {
            background-color: oklch(1 0 0);
        }

        .pure-black {
            background-color: oklch(0 0 0);
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
            background-color: var(--foreground);
            color: var(--background);
            border: none;
            border-radius: 6px;
        }

        button:hover {
            opacity: 0.9;
        }

        .info {
            margin-top: 30px;
            padding: 20px;
            background-color: var(--foreground);
            color: var(--background);
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Background Color Test</h1>
        
        <p>Current mode: <strong id="mode-display">Light</strong></p>
        
        <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
        <button onclick="document.documentElement.classList.add('dark')">Force Dark</button>
        <button onclick="document.documentElement.classList.remove('dark')">Force Light</button>

        <h2>Color References</h2>
        
        <div class="color-box light-bg">
            <h3>Light Mode Background</h3>
            <p>oklch(0.97 0 0) - Off-white</p>
        </div>

        <div class="color-box dark-bg">
            <h3>Dark Mode Background</h3>
            <p>oklch(0.269 0 0) - Dark gray</p>
        </div>

        <div class="color-box pure-white">
            <h3>Pure White Reference</h3>
            <p>oklch(1 0 0) - Pure white</p>
        </div>

        <div class="color-box pure-black">
            <h3>Pure Black Reference</h3>
            <p>oklch(0 0 0) - Pure black</p>
        </div>

        <div class="info">
            <h3>Computed Styles</h3>
            <div id="computed-styles"></div>
        </div>
    </div>

    <script>
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            updateDisplay();
        }

        function updateDisplay() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('mode-display').textContent = isDark ? 'Dark' : 'Light';
            
            const bodyStyle = window.getComputedStyle(document.body);
            document.getElementById('computed-styles').innerHTML = `
                <p>Body background-color: <strong>${bodyStyle.backgroundColor}</strong></p>
                <p>Body color: <strong>${bodyStyle.color}</strong></p>
                <p>HTML class: <strong>${document.documentElement.className || '(none)'}</strong></p>
            `;
        }

        // Update on load
        updateDisplay();

        // Watch for changes
        const observer = new MutationObserver(updateDisplay);
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
    </script>
</body>
</html>
